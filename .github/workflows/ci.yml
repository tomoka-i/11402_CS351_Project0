name: C/C++ Build and Test

on:
	push:
		branches: [ main ]
	pull_request:
		branches: [ main ]

jobs:
	build-and-test:
		runs-on: ubuntu-latest
		steps:
			- name: Checkout repository
				uses: actions/checkout@v3

			- name: Install build tools
				run: |
					sudo apt-get update
					sudo apt-get install -y build-essential

			- name: Build tests
				run: |
					# compile only the library and the tests runner
					g++ -std=c++11 -O2 -Wall -Werror src/twosum.cpp tests/test_twosum.cpp -o tests/twosum_test

			- name: Run tests
				run: |
					./tests/twosum_test
